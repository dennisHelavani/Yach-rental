<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0f2035"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a3050" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Sea background -->
  <rect width="800" height="500" fill="url(#sea)"/>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Subtle compass -->
  <g transform="translate(720,60)" opacity="0.2">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#39f5e2" stroke-width="0.5"/>
    <line x1="0" y1="-20" x2="0" y2="20" stroke="#39f5e2" stroke-width="0.5"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#39f5e2" stroke-width="0.5"/>
    <text x="0" y="-28" text-anchor="middle" fill="#39f5e2" font-size="8" font-family="sans-serif">N</text>
  </g>

  <!-- Scale bar -->
  <g transform="translate(30,470)" opacity="0.25">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#39f5e2" stroke-width="1"/>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#39f5e2" stroke-width="1"/>
    <line x1="60" y1="-3" x2="60" y2="3" stroke="#39f5e2" stroke-width="1"/>
    <text x="30" y="12" text-anchor="middle" fill="#39f5e2" font-size="7" font-family="sans-serif">~50 km</text>
  </g>

  <!-- MAINLAND (simplified Attica peninsula) -->
  <path d="M 50,20 L 180,15 200,30 210,60 190,80 170,95 155,110 145,90 120,85 90,72 60,55 50,35 Z"
        fill="#1a2d45" stroke="#2a4060" stroke-width="1"/>
  <!-- Athens label -->
  <text x="135" y="55" fill="#39f5e2" font-size="9" font-family="sans-serif" opacity="0.5">ATTICA</text>

  <!-- KEA -->
  <ellipse cx="220" cy="155" rx="18" ry="25" fill="#1a2d45" stroke="#2a4060" stroke-width="1" transform="rotate(-15,220,155)"/>
  <text x="220" y="190" text-anchor="middle" fill="#5a7a9a" font-size="7" font-family="sans-serif">Kea</text>

  <!-- ANDROS -->
  <ellipse cx="380" cy="65" rx="15" ry="35" fill="#1a2d45" stroke="#2a4060" stroke-width="1" transform="rotate(20,380,65)"/>
  <text x="380" y="110" text-anchor="middle" fill="#5a7a9a" font-size="7" font-family="sans-serif">Andros</text>

  <!-- TINOS -->
  <ellipse cx="440" cy="75" rx="12" ry="22" fill="#1a2d45" stroke="#2a4060" stroke-width="1" transform="rotate(15,440,75)"/>
  <text x="440" y="105" text-anchor="middle" fill="#5a7a9a" font-size="7" font-family="sans-serif">Tinos</text>

  <!-- MYKONOS -->
  <ellipse cx="510" cy="95" rx="18" ry="16" fill="#1e3350" stroke="#39f5e2" stroke-width="1.5"/>
  <text x="510" y="80" text-anchor="middle" fill="#39f5e2" font-size="9" font-weight="bold" font-family="sans-serif">MYKONOS</text>

  <!-- SYROS -->
  <ellipse cx="380" cy="155" rx="14" ry="18" fill="#1a2d45" stroke="#2a4060" stroke-width="1"/>
  <text x="380" y="180" text-anchor="middle" fill="#5a7a9a" font-size="7" font-family="sans-serif">Syros</text>

  <!-- PAROS -->
  <ellipse cx="430" cy="225" rx="22" ry="20" fill="#1e3350" stroke="#39f5e2" stroke-width="1.5"/>
  <text x="430" y="215" text-anchor="middle" fill="#39f5e2" font-size="9" font-weight="bold" font-family="sans-serif">PAROS</text>

  <!-- NAXOS -->
  <ellipse cx="490" cy="240" rx="25" ry="30" fill="#1a2d45" stroke="#2a4060" stroke-width="1"/>
  <text x="490" y="235" text-anchor="middle" fill="#5a7a9a" font-size="8" font-family="sans-serif">Naxos</text>

  <!-- IOS -->
  <ellipse cx="400" cy="330" rx="16" ry="14" fill="#1e3350" stroke="#39f5e2" stroke-width="1.5"/>
  <text x="400" y="325" text-anchor="middle" fill="#39f5e2" font-size="9" font-weight="bold" font-family="sans-serif">IOS</text>

  <!-- AMORGOS -->
  <ellipse cx="560" cy="310" rx="12" ry="25" fill="#1a2d45" stroke="#2a4060" stroke-width="1" transform="rotate(-30,560,310)"/>
  <text x="560" y="345" text-anchor="middle" fill="#5a7a9a" font-size="7" font-family="sans-serif">Amorgos</text>

  <!-- FOLEGANDROS -->
  <ellipse cx="330" cy="370" rx="14" ry="8" fill="#1a2d45" stroke="#2a4060" stroke-width="1"/>
  <text x="330" y="385" text-anchor="middle" fill="#5a7a9a" font-size="6" font-family="sans-serif">Folegandros</text>

  <!-- SIKINOS -->
  <ellipse cx="360" cy="355" rx="8" ry="10" fill="#1a2d45" stroke="#2a4060" stroke-width="1"/>

  <!-- MILOS -->
  <ellipse cx="250" cy="380" rx="20" ry="16" fill="#1a2d45" stroke="#2a4060" stroke-width="1"/>
  <text x="250" y="405" text-anchor="middle" fill="#5a7a9a" font-size="7" font-family="sans-serif">Milos</text>

  <!-- SANTORINI (crescent shape) -->
  <path d="M 290,420 Q 300,390 310,410 Q 315,435 305,445 Q 295,440 290,420 Z"
        fill="#1e3350" stroke="#39f5e2" stroke-width="1.5"/>
  <text x="300" y="460" text-anchor="middle" fill="#39f5e2" font-size="9" font-weight="bold" font-family="sans-serif">SANTORINI</text>

  <!-- AEGEAN SEA label -->
  <text x="620" y="260" fill="#1a3050" font-size="18" font-family="sans-serif" font-weight="bold" letter-spacing="8" opacity="0.3" transform="rotate(15,620,260)">AEGEAN SEA</text>

  <!-- CYCLADES label -->
  <text x="350" y="290" fill="#39f5e2" font-size="11" font-family="sans-serif" font-weight="bold" letter-spacing="4" opacity="0.15">CYCLADES</text>

  <!-- Decorative wave lines -->
  <path d="M 600,150 Q 620,145 640,150 Q 660,155 680,150" fill="none" stroke="#1a3050" stroke-width="1" opacity="0.3"/>
  <path d="M 610,160 Q 630,155 650,160 Q 670,165 690,160" fill="none" stroke="#1a3050" stroke-width="1" opacity="0.2"/>

  <path d="M 100,300 Q 120,295 140,300 Q 160,305 180,300" fill="none" stroke="#1a3050" stroke-width="1" opacity="0.3"/>
  <path d="M 110,310 Q 130,305 150,310 Q 170,315 190,310" fill="none" stroke="#1a3050" stroke-width="1" opacity="0.2"/>
</svg>
